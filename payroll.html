<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payroll — HRIS PT KMA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --primary:#1d4ed8; --primary-dk:#1e3a8a; --sidebar-w:240px; --bg:#f1f5f9; --card:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0; --radius:12px; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    .sidebar { position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w); background:var(--primary-dk); color:white; display:flex; flex-direction:column; z-index:100; }
    .sidebar-brand { padding:1.25rem; border-bottom:1px solid rgba(255,255,255,.08); }
    .logo-row { display:flex; align-items:center; gap:.6rem; }
    .logo-icon { width:36px; height:36px; background:rgba(255,255,255,.12); border-radius:10px; display:grid; place-items:center; font-size:1.1rem; }
    .logo-text { font-size:.82rem; font-weight:700; line-height:1.3; }
    .logo-sub  { font-size:.68rem; opacity:.5; }
    .sidebar-nav { flex:1; overflow-y:auto; padding:.75rem 0; }
    .nav-label { font-size:.65rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; opacity:.4; padding:.75rem 1.25rem .4rem; }
    .nav-item { display:flex; align-items:center; gap:.75rem; padding:.65rem 1.25rem; font-size:.875rem; font-weight:500; color:rgba(255,255,255,.7); text-decoration:none; cursor:pointer; transition:background .15s; position:relative; }
    .nav-item:hover { background:rgba(255,255,255,.07); color:white; }
    .nav-item.active { background:rgba(255,255,255,.12); color:white; }
    .nav-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#60a5fa; border-radius:0 2px 2px 0; }
    .nav-icon { font-size:1rem; width:20px; text-align:center; }
    .soon { margin-left:auto; font-size:.62rem; background:rgba(255,255,255,.08); padding:1px 6px; border-radius:4px; opacity:.6; }
    .sidebar-footer { padding:1rem 1.25rem; border-top:1px solid rgba(255,255,255,.08); }
    .sidebar-user { display:flex; align-items:center; gap:.7rem; }
    .s-av { width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.15); display:grid; place-items:center; font-size:.9rem; font-weight:600; }
    .u-name { font-size:.82rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .u-role { font-size:.7rem; opacity:.5; }
    .btn-lo { background:none; border:none; color:rgba(255,255,255,.4); cursor:pointer; font-size:1rem; }
    .btn-lo:hover { color:#f87171; }

    .main-wrap { margin-left:var(--sidebar-w); min-height:100vh; display:flex; flex-direction:column; }
    .top-bar { height:64px; background:white; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 1.75rem; position:sticky; top:0; z-index:50; }
    .top-bar h1 { font-size:1.1rem; font-weight:700; }
    .bc { font-size:.75rem; color:var(--muted); }
    .main { flex:1; padding:1.75rem; }

    .card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); }
    .card-head { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border-bottom:1px solid var(--border); }
    .card-head h3 { font-size:.9rem; font-weight:700; }
    .card-body { padding:1.25rem; }

    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.25rem; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; }
    .stat-label { font-size:.75rem; color:var(--muted); font-weight:600; margin-bottom:.4rem; }
    .stat-val { font-size:1.4rem; font-weight:800; }
    .stat-sub { font-size:.72rem; color:var(--muted); margin-top:.2rem; }
    .c-blue{color:#2563eb;} .c-green{color:#16a34a;} .c-yellow{color:#d97706;} .c-purple{color:#7c3aed;}

    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:.875rem; }
    th { padding:.65rem 1rem; text-align:left; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); background:#f8fafc; border-bottom:1px solid var(--border); white-space:nowrap; }
    td { padding:.75rem 1rem; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#fafafa; }
    .empty-row td { text-align:center; padding:2rem; color:var(--muted); }

    .badge { display:inline-flex; align-items:center; padding:2px 10px; border-radius:99px; font-size:.72rem; font-weight:700; }
    .badge.draft  { background:#fef3c7; color:#d97706; }
    .badge.final  { background:#dcfce7; color:#16a34a; }

    .filter-bar { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; margin-bottom:1rem; }
    .inp { padding:.55rem .85rem; border:1.5px solid var(--border); border-radius:9px; font-size:.875rem; color:var(--text); outline:none; transition:border-color .2s; background:white; }
    .inp:focus { border-color:var(--primary); }
    .inp-sm { padding:.45rem .75rem; font-size:.82rem; }
    .inp-full { width:100%; }

    .btn-primary { display:inline-flex; align-items:center; gap:.4rem; padding:.6rem 1.1rem; background:var(--primary); color:white; border:none; border-radius:9px; font-size:.875rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
    .btn-primary:hover { opacity:.9; }
    .btn-secondary { display:inline-flex; align-items:center; gap:.4rem; padding:.55rem 1rem; background:white; color:var(--text); border:1.5px solid var(--border); border-radius:9px; font-size:.82rem; font-weight:600; cursor:pointer; transition:all .15s; }
    .btn-secondary:hover { border-color:var(--primary); color:var(--primary); }
    .btn-sm { padding:.3rem .7rem; font-size:.75rem; border-radius:7px; border:1px solid var(--border); background:white; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .btn-sm:hover { border-color:var(--primary); color:var(--primary); }
    .btn-danger { color:#dc2626; border-color:#fca5a5; }
    .btn-danger:hover { background:#fee2e2; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; place-items:center; z-index:1000; padding:1rem; overflow-y:auto; }
    .modal-overlay.open { display:grid; }
    .modal { background:white; border-radius:var(--radius); width:100%; max-width:560px; box-shadow:0 20px 60px rgba(0,0,0,.15); overflow:hidden; }
    .modal-lg { max-width:780px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; padding:1.1rem 1.4rem; border-bottom:1px solid var(--border); }
    .modal-head h3 { font-size:1rem; font-weight:700; }
    .modal-close { background:none; border:none; font-size:1.25rem; cursor:pointer; color:var(--muted); }
    .modal-body { padding:1.4rem; max-height:70vh; overflow-y:auto; }
    .modal-foot { padding:.9rem 1.4rem; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:.6rem; }

    .fg { margin-bottom:.9rem; }
    .fg label { display:block; font-size:.78rem; font-weight:600; color:var(--muted); margin-bottom:.35rem; }
    .inp-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }

    /* SLIP GAJI LAYOUT */
    .slip-wrap { font-size:.875rem; position:relative; }
    .slip-watermark { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:62%; max-width:330px; opacity:.05; pointer-events:none; z-index:0; }
    .slip-wrap > *:not(.slip-watermark) { position:relative; z-index:1; }
    .slip-header { display:flex; flex-direction:column; align-items:center; text-align:center; gap:.45rem; padding-bottom:.85rem; border-bottom:2px solid var(--primary-dk); margin-bottom:.25rem; }
    .slip-logo { width:64px; height:64px; object-fit:contain; }
    .slip-kop { width:100%; }
    .slip-header h2 { font-size:1.15rem; font-weight:800; color:var(--primary-dk); letter-spacing:.3px; }
    .slip-header p { font-size:.78rem; color:var(--muted); margin-top:2px; }
    .slip-doc-title { text-align:center; font-weight:700; font-size:.95rem; letter-spacing:1px; margin:.6rem 0 1rem; color:var(--text); }
    .slip-info { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:1rem; font-size:.82rem; }
    .slip-info-row { display:flex; gap:.5rem; }
    .slip-info-lbl { color:var(--muted); min-width:120px; }
    .slip-section { margin-bottom:1rem; }
    .slip-section-title { font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); border-bottom:1px solid var(--border); padding-bottom:.3rem; margin-bottom:.5rem; }
    .slip-row { display:flex; justify-content:space-between; padding:.3rem 0; font-size:.82rem; }
    .slip-row.total { font-weight:700; border-top:1px solid var(--border); padding-top:.5rem; margin-top:.25rem; }
    .slip-takehome { background:#fff; color:var(--navy); border:2px solid var(--navy); border-radius:10px; padding:.85rem 1rem; display:flex; justify-content:space-between; align-items:center; margin-top:1rem; }
    .slip-takehome-lbl { font-size:.82rem; font-weight:600; }
    .slip-takehome-val { font-size:1.2rem; font-weight:800; }
    .slip-sign { width:260px; margin:1.5rem 0 0 auto; text-align:center; }
    .slip-sign p { font-size:.8rem; margin:0; color:var(--text); }
    .slip-sign-area { position:relative; height:104px; margin:.15rem 0; }
    .slip-stamp { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) rotate(-8deg); height:104px; opacity:.9; mix-blend-mode:multiply; }
    .slip-ttd { position:absolute; left:50%; top:50%; transform:translate(-50%,-58%); height:66px; mix-blend-mode:multiply; }
    .slip-sign-name { font-weight:700; text-decoration:underline; margin-top:.25rem; }
    .slip-sign-title { color:var(--muted); font-size:.74rem; }
    .slip-footer { text-align:center; font-size:.72rem; color:var(--muted); margin-top:1rem; padding-top:.75rem; border-top:1px solid var(--border); }

    /* PERIODE LIST */
    .periode-item { border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; transition:all .15s; cursor:pointer; }
    .periode-item:hover { border-color:var(--primary); background:#fafafa; }
    .periode-item:last-child { margin-bottom:0; }
    .periode-name { font-weight:700; font-size:.95rem; }
    .periode-meta { font-size:.78rem; color:var(--muted); margin-top:.2rem; }

    /* SALDO KOMPONEN */
    .komp-item { display:flex; align-items:center; gap:.75rem; padding:.6rem 0; border-bottom:1px solid var(--border); }
    .komp-item:last-child { border-bottom:none; }
    .komp-name { flex:1; font-size:.875rem; }
    .komp-tipe { font-size:.72rem; padding:2px 8px; border-radius:6px; font-weight:600; }
    .tipe-t { background:#dcfce7; color:#16a34a; }
    .tipe-p { background:#fee2e2; color:#dc2626; }

    #toast { position:fixed; bottom:1.5rem; right:1.5rem; padding:.75rem 1.25rem; border-radius:10px; font-size:.875rem; font-weight:500; color:white; z-index:9999; display:none; box-shadow:0 8px 24px rgba(0,0,0,.12); }
    #toast.success { background:#16a34a; }
    #toast.error   { background:#dc2626; }
    #lo { position:fixed; inset:0; background:white; display:grid; place-items:center; z-index:9999; }
    .spin { width:36px; height:36px; border:3px solid #e2e8f0; border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 1rem; }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media print {
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
      body * { visibility:hidden; }
      #printArea, #printArea * { visibility:visible; }
      #modalSlip { position:static !important; display:block !important; background:none !important; padding:0 !important; }
      #modalSlip .modal { position:static !important; max-width:none !important; width:auto !important; max-height:none !important; margin:0 !important; box-shadow:none !important; border-radius:0 !important; }
      #modalSlip .modal-head, #modalSlip .modal-foot { display:none !important; }
      .modal-body, #printArea { max-height:none !important; overflow:visible !important; }
      #printArea { position:absolute; left:0; top:0; width:100%; padding:1.5rem; }
    }
  </style>

  <link rel="stylesheet" href="theme.css">
</head>

// ============================================================
// KALKULASI PPh 21 (Metode Progresif Tahunan)
// ============================================================
function hitungPPh21Bulanan(gajiPokok, totalTunjangan, bpjsKesK, bpjsJhtK, bpjsJpK, statusPtkp) {
  const brutoSetahun = (gajiPokok + totalTunjangan) * 12
  const biayaJabatanBulan = Math.min(gajiPokok * TARIF.BIAYA_JABATAN_PCT, TARIF.BIAYA_JABATAN_MAX)
  const biayaJabatanSetahun = biayaJabatanBulan * 12
  const bpjsSetahun = (bpjsKesK + bpjsJhtK + bpjsJpK) * 12
  const nettoSetahun = brutoSetahun - biayaJabatanSetahun - bpjsSetahun
  const ptkp = TARIF.PTKP[statusPtkp] || TARIF.PTKP['TK/0']
  const pkp = Math.max(0, Math.floor((nettoSetahun - ptkp) / 1000) * 1000)

  let pph = 0
  if (pkp <= 60000000)          pph = pkp * 0.05
  else if (pkp <= 250000000)    pph = 60000000*0.05 + (pkp-60000000)*0.15
  else if (pkp <= 500000000)    pph = 60000000*0.05 + 190000000*0.15 + (pkp-250000000)*0.25
  else if (pkp <= 5000000000)   pph = 60000000*0.05 + 190000000*0.15 + 250000000*0.25 + (pkp-500000000)*0.30
  else                          pph = 60000000*0.05 + 190000000*0.15 + 250000000*0.25 + 4500000000*0.30 + (pkp-5000000000)*0.35

  return { pphBulanan: Math.round(pph/12), nettoSetahun, ptkp, pkp }
}

// ============================================================
// HITUNG SLIP SATU KARYAWAN
// ============================================================
function hitungSlip(karyawan, komponenKaryawan, jamKerja) {
  // === GAJI PER-JAM (freelance) — dibayar bersih, tanpa potongan BPJS/PPh ===
  if (karyawan.tipe_gaji === 'per_jam') {
    const tarif = parseFloat(karyawan.tarif_per_jam) || 0
    const jam   = Math.round((jamKerja || 0) * 100) / 100
    const total = Math.round(jam * tarif)
    return {
      gaji_pokok: 0, total_tunjangan: total,
      detail_tunjangan: [{ nama: `Upah ${jam} jam × ${IDR(tarif)}/jam`, nilai: total, kena_pajak: false }],
      detail_potongan: [],
      bpjs_kes_karyawan: 0, bpjs_jht_karyawan: 0, bpjs_jp_karyawan: 0,
      bpjs_kes_perusahaan: 0, bpjs_jht_perusahaan: 0, bpjs_jp_perusahaan: 0,
      pph21: 0, total_potongan_lain: 0,
      total_pendapatan: total, total_potongan: 0, gaji_bersih: total,
      status_ptkp: karyawan.status_ptkp || 'TK/0', penghasilan_netto_setahun: 0, ptkp: 0, pkp: 0
    }
  }

  const gajiPokok = parseFloat(karyawan.gaji_pokok) || 0
  const statusPtkp = karyawan.status_ptkp || 'TK/0'

  // Tunjangan & potongan dari komponen
  let totalTunjanganKenaPajak = 0, totalTunjanganBebasPajak = 0
  let totalPotonganLain = 0
  const detailTunjangan = [], detailPotongan = []

  komponenKaryawan.forEach(kk => {
    const k = allKomponen.find(k => k.id === kk.komponen_id)
    if (!k || !k.aktif) return
    const nilai = parseFloat(kk.nilai) || 0
    if (k.tipe === 'tunjangan') {
      if (k.kena_pajak) totalTunjanganKenaPajak += nilai
      else totalTunjanganBebasPajak += nilai
      detailTunjangan.push({ nama: k.nama, nilai, kena_pajak: k.kena_pajak })
    } else {
      totalPotonganLain += nilai
      detailPotongan.push({ nama: k.nama, nilai })
    }
  })

  const totalTunjangan = totalTunjanganKenaPajak + totalTunjanganBebasPajak
  const totalPendapatan = gajiPokok + totalTunjangan

  // BPJS
  const gajiCapKes = Math.min(gajiPokok, TARIF.BPJS_KES_MAX_GAJI)
  const gajiCapJp  = Math.min(gajiPokok, TARIF.BPJS_JP_MAX_GAJI)

  const bpjsKesK = Math.round(gajiCapKes * TARIF.BPJS_KES_KARYAWAN)
  const bpjsJhtK = Math.round(gajiPokok  * TARIF.BPJS_JHT_KARYAWAN)
  const bpjsJpK  = Math.round(gajiCapJp  * TARIF.BPJS_JP_KARYAWAN)

  const bpjsKesP = Math.round(gajiCapKes * TARIF.BPJS_KES_PERUSAHAAN)
  const bpjsJhtP = Math.round(gajiPokok  * TARIF.BPJS_JHT_PERUSAHAAN)
  const bpjsJpP  = Math.round(gajiCapJp  * TARIF.BPJS_JP_PERUSAHAAN)

  // PPh 21
  const { pphBulanan, nettoSetahun, ptkp, pkp } = hitungPPh21Bulanan(
    gajiPokok, totalTunjanganKenaPajak, bpjsKesK, bpjsJhtK, bpjsJpK, statusPtkp
  )

  const totalPotongan = bpjsKesK + bpjsJhtK + bpjsJpK + pphBulanan + totalPotonganLain
  const gajiBersih    = totalPendapatan - totalPotongan

  return {
    gaji_pokok: gajiPokok, total_tunjangan: totalTunjangan,
    detail_tunjangan: detailTunjangan, detail_potongan: detailPotongan,
    bpjs_kes_karyawan: bpjsKesK, bpjs_jht_karyawan: bpjsJhtK, bpjs_jp_karyawan: bpjsJpK,
    bpjs_kes_perusahaan: bpjsKesP, bpjs_jht_perusahaan: bpjsJhtP, bpjs_jp_perusahaan: bpjsJpP,
    pph21: pphBulanan, total_potongan_lain: totalPotonganLain,
    total_pendapatan: totalPendapatan, total_potongan: totalPotongan, gaji_bersih: gajiBersih,
    status_ptkp: statusPtkp, penghasilan_netto_setahun: nettoSetahun, ptkp, pkp
  }
}

async function buatPeriode() {
  const bulan  = parseInt(document.getElementById('pBulan').value)
  const tahun  = parseInt(document.getElementById('pTahun').value)
  const catatan = document.getElementById('pCatatan').value.trim()

  // Cek duplikat
  const { data: exists } = await sb.from('payroll_periode')
    .select('id').eq('bulan',bulan).eq('tahun',tahun).single()
  if (exists) { toast(`Periode ${BULAN_NAMA[bulan]} ${tahun} sudah ada`, 'error'); return }

  // Buat periode
  const { data: periode, error } = await sb.from('payroll_periode').insert({
    bulan, tahun, status:'draft', catatan:catatan||null, dibuat_oleh:myProfile.id
  }).select().single()
  if (error) { toast('Gagal buat periode: '+error.message,'error'); return }

  // Generate slip: karyawan aktif yang punya gaji bulanan ATAU tipe gaji per-jam
  const { data: karyawans } = await sb.from('karyawan')
    .select('*').eq('status','aktif').or('gaji_pokok.neq.0,tipe_gaji.eq.per_jam')
  if (!karyawans?.length) {
    toast('Periode dibuat. Tidak ada karyawan aktif dengan gaji.','error')
    cm('modalPeriode'); renderHR(); return
  }

  // Ambil semua komponen karyawan sekaligus
  const { data: semuaKomp } = await sb.from('karyawan_komponen')
    .select('*').in('karyawan_id', karyawans.map(k=>k.id))

  // Jam kerja (dari absensi) untuk karyawan bergaji per-jam
  const jamMap = {}
  const perJamIds = karyawans.filter(k=>k.tipe_gaji==='per_jam').map(k=>k.id)
  if (perJamIds.length) {
    const awal  = `${tahun}-${String(bulan).padStart(2,'0')}-01`
    const akhir = `${tahun}-${String(bulan).padStart(2,'0')}-31`
    const { data: abs } = await sb.from('absensi').select('karyawan_id,durasi_kerja_menit')
      .in('karyawan_id', perJamIds).gte('tanggal', awal).lte('tanggal', akhir)
    ;(abs||[]).forEach(a => { jamMap[a.karyawan_id] = (jamMap[a.karyawan_id]||0) + (a.durasi_kerja_menit||0) })
    Object.keys(jamMap).forEach(id => { jamMap[id] = Math.round((jamMap[id]/60)*100)/100 })
  }

  const slips = karyawans.map(k => {
    const kompK = (semuaKomp||[]).filter(kk=>kk.karyawan_id===k.id)
    const slip = hitungSlip(k, kompK, jamMap[k.id]||0)
    return { periode_id: periode.id, karyawan_id: k.id, ...slip }
  })

  const { error: slipErr } = await sb.from('slip_gaji').insert(slips)
  if (slipErr) { toast('Periode dibuat tapi slip gagal: '+slipErr.message,'error'); return }

  toast(`Periode ${BULAN_NAMA[bulan]} ${tahun} dibuat — ${slips.length} slip di-generate`)
  cm('modalPeriode')
  renderHR()
}

async function finalisasi(periodeId) {
  if (!confirm('Finalisasi periode ini? Slip tidak bisa diubah setelah final (bisa dibatalkan lagi).')) return
  const { error } = await sb.from('payroll_periode').update({status:'final'}).eq('id',periodeId)
  if (error) { toast('Gagal: '+error.message,'error'); return }
  toast('Periode berhasil difinalisasi')
  renderHR()
}

async function batalFinalisasi(periodeId) {
  if (!confirm('Batalkan finalisasi? Periode kembali ke status Draft dan slip bisa diubah lagi.')) return
  const { error } = await sb.from('payroll_periode').update({status:'draft'}).eq('id',periodeId)
  if (error) { toast('Gagal: '+error.message,'error'); return }
  toast('Finalisasi dibatalkan — periode kembali Draft')
  renderHR()
}

async function hapusPeriode(id, nama, isFinal) {
  const pesan = isFinal
    ? `Periode "${nama}" berstatus FINAL. Yakin hapus? Semua slip gaji periode ini akan terhapus permanen.`
    : `Hapus periode "${nama}"? Semua slip akan ikut terhapus.`
  if (!confirm(pesan)) return
  const { error } = await sb.from('payroll_periode').delete().eq('id',id)
  if (error) { toast('Gagal hapus: '+error.message,'error'); return }
  toast('Periode dihapus')
  renderHR()
}

// EDIT KOMPONEN KARYAWAN (dari detail periode)
// ============================================================
async function editSlipKomp(karyawanId, periodeId) {
  const k = allKaryawan.find(k=>k.id===karyawanId)
  editKompKaryawanId = karyawanId
  await loadKompModal(karyawanId)
  document.getElementById('kompTitle').textContent = `Komponen Gaji — ${k?.nama_lengkap||''}`
  document.getElementById('modalKomp')._periodeId = periodeId
  om('modalKomp')
}

// ============================================================
// MODAL KOMPONEN GAJI
// ============================================================
async function loadKompModal(karyawanId=null) {
  if (karyawanId) editKompKaryawanId = karyawanId
  const kid = editKompKaryawanId

  const { data: existing } = kid
    ? await sb.from('karyawan_komponen').select('*').eq('karyawan_id',kid)
    : { data: [] }

  const selHtml = kid
    ? `<div class="fg" style="margin-bottom:1rem;">
        <label>Karyawan</label>
        <select class="inp inp-full" id="kompKary" onchange="loadKompModal(this.value)">
          ${allKaryawan.map(k=>`<option value="${k.id}"${k.id===kid?' selected':''}>${k.nama_lengkap}</option>`).join('')}
        </select>
      </div>`
    : `<div class="fg" style="margin-bottom:1rem;">
        <label>Pilih Karyawan</label>
        <select class="inp inp-full" id="kompKary" onchange="loadKompModal(this.value)">
          <option value="">— Pilih Karyawan —</option>
          ${allKaryawan.map(k=>`<option value="${k.id}">${k.nama_lengkap}</option>`).join('')}
        </select>
      </div>`

  const kompHtml = allKomponen.map(komp => {
    const ex = existing?.find(e=>e.komponen_id===komp.id)
    return `
      <div class="komp-item">
        <span class="komp-tipe ${komp.tipe==='tunjangan'?'tipe-t':'tipe-p'}">${komp.tipe==='tunjangan'?'↑':'↓'}</span>
        <span class="komp-name">${komp.nama} ${komp.kena_pajak?'<span style="font-size:.7rem;color:var(--muted)">(kena pajak)</span>':''}</span>
        <input type="number" class="inp inp-sm" style="width:140px;text-align:right"
          data-komp="${komp.id}" value="${ex?.nilai||0}" min="0" placeholder="0">
      </div>`
  }).join('')

  document.getElementById('kompBody').innerHTML = selHtml + kompHtml
}

async function saveKomp() {
  const kid = editKompKaryawanId || document.getElementById('kompKary')?.value
  if (!kid) { toast('Pilih karyawan dulu','error'); return }

  const inputs = document.querySelectorAll('#kompBody input[data-komp]')
  const upserts = []
  inputs.forEach(inp => {
    const nilai = parseFloat(inp.value)||0
    upserts.push({ karyawan_id:kid, komponen_id:inp.dataset.komp, nilai })
  })

  const { error } = await sb.from('karyawan_komponen')
    .upsert(upserts, { onConflict:'karyawan_id,komponen_id' })
  if (error) { toast('Gagal simpan: '+error.message,'error'); return }

  // Jika dipanggil dari detail periode (edit slip), regenerate slip karyawan ini
  const periodeId = document.getElementById('modalKomp')._periodeId
  if (periodeId) {
    await regenerateSlip(kid, periodeId)
    toast('Komponen gaji disimpan & slip diperbarui')
    cm('modalKomp')
    document.getElementById('modalKomp')._periodeId = null
    bukaDetailPeriode(periodeId)
  } else {
    toast('Komponen gaji disimpan')
    cm('modalKomp')
  }
}

// Regenerate slip untuk satu karyawan di satu periode
async function jamKerjaPeriode (karyawanId, bulan, tahun) {
  const awal  = `${tahun}-${String(bulan).padStart(2,'0')}-01`
  const akhir = `${tahun}-${String(bulan).padStart(2,'0')}-31`
  const { data } = await sb.from('absensi').select('durasi_kerja_menit')
    .eq('karyawan_id', karyawanId).gte('tanggal', awal).lte('tanggal', akhir)
  const menit = (data||[]).reduce((s,a)=> s + (a.durasi_kerja_menit||0), 0)
  return Math.round((menit/60)*100)/100
}

async function regenerateSlip(karyawanId, periodeId) {
  const { data: k } = await sb.from('karyawan').select('*').eq('id', karyawanId).single()
  if (!k) return

  const { data: kompK } = await sb.from('karyawan_komponen').select('*').eq('karyawan_id', karyawanId)
  let jam = 0
  if (k.tipe_gaji === 'per_jam') {
    const { data: per } = await sb.from('payroll_periode').select('bulan,tahun').eq('id', periodeId).single()
    if (per) jam = await jamKerjaPeriode(karyawanId, per.bulan, per.tahun)
  }
  const slip = hitungSlip(k, kompK || [], jam)

  const { error } = await sb.from('slip_gaji')
    .update(slip)
    .eq('periode_id', periodeId)
    .eq('karyawan_id', karyawanId)

  if (error) toast('Slip gagal diperbarui: '+error.message, 'error')
}

async function renderKaryawan() {
  document.getElementById('topBc').textContent = 'Riwayat slip gaji saya'
  document.getElementById('topActions').innerHTML = ''

  const { data: allSlips } = await sb.from('slip_gaji')
    .select('*, periode:periode_id(*)')
    .eq('karyawan_id', myProfile.id)
    .order('created_at', {ascending:false})

  // Karyawan hanya melihat slip yang sudah final
  const slips = (allSlips || []).filter(sl => sl.periode?.status === 'final')

  const tblHtml = slips.length
    ? slips.map(sl => `
      <tr>
        <td>${BULAN_NAMA[sl.periode?.bulan]} ${sl.periode?.tahun}</td>
        <td style="text-align:right">${IDR(sl.gaji_pokok)}</td>
        <td style="text-align:right">${IDR(sl.total_tunjangan)}</td>
        <td style="text-align:right;color:#dc2626">${IDR(sl.total_potongan)}</td>
        <td style="text-align:right;font-weight:700;color:#16a34a">${IDR(sl.gaji_bersih)}</td>
        <td><button class="btn-sm" onclick="lihatSlip('${sl.id}')"><svg class="ic" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> Lihat Slip</button></td>
      </tr>`).join('')
    : '<tr class="empty-row"><td colspan="6">Belum ada slip gaji yang diterbitkan</td></tr>'

  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-head"><h3><svg class="ic" viewBox="0 0 24 24"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 7h8M8 11h8M8 15h5"/></svg> Riwayat Slip Gaji Saya</h3></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Periode</th><th style="text-align:right">Gaji Pokok</th><th style="text-align:right">Tunjangan</th><th style="text-align:right">Potongan</th><th style="text-align:right">Take-Home</th><th>Aksi</th></tr></thead>
          <tbody>${tblHtml}</tbody>
        </table>
      </div>
    </div>`
}

// INIT
// ============================================================
async function init() {
  const { data:{ session } } = await sb.auth.getSession()
  if (!session) { window.location.href='index.html'; return }

  const [{ data:k },{ data:karys },{ data:komps }] = await Promise.all([
    sb.from('karyawan').select('*').eq('id',session.user.id).single(),
    sb.from('karyawan').select('id,nama_lengkap,nik,gaji_pokok,status_ptkp,jabatan_id,divisi_id').eq('status','aktif').order('nama_lengkap'),
    sb.from('komponen_gaji').select('*').eq('aktif',true).order('tipe').order('nama')
  ])

  myProfile    = k
  allKaryawan  = karys || []
  allKomponen  = komps || []

  document.getElementById('sbName').textContent = k.nama_lengkap
  document.getElementById('sbRole').textContent = k.role==='hr_admin'?'HR Admin':'Karyawan'
  if (k.role === 'hr_admin') ['adminNavLbl','navLokasi','navLaporan'].forEach(function(id){var el=document.getElementById(id); if(el) el.style.display=''})
  document.getElementById('sbAv').innerHTML = k.foto_url ? `<img src="${k.foto_url}" alt="">` : (k.nama_lengkap?.charAt(0).toUpperCase()||'?')

  // Set bulan default di modal periode ke bulan sekarang
  document.getElementById('pBulan').value = new Date().getMonth()+1

  await renderPage()
  document.getElementById('lo').style.display = 'none'
}

init()
